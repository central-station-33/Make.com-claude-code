name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/inrange-backend-service-MC9DD
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy core functions (npm imports)
        run: |
          supabase functions deploy seed-scores    --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy enrich-pending --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy legacy functions (best-effort)
        continue-on-error: true
        run: |
          supabase functions deploy ingest-raw-properties   --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy score-property          --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy enrich-property         --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy burnt-out-landlord-scan --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy fetch-properties        --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy health                  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy notification-status     --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
