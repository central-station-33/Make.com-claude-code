name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
      - claude/inrange-backend-service-MC9DD
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          supabase functions deploy ingest-raw-properties  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy score-property         --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy enrich-property        --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy burnt-out-landlord-scan --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy fetch-properties       --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy health                 --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy notification-status    --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
