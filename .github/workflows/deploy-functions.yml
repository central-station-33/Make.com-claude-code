name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/inrange-backend-service-MC9DD
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v1.207.9/supabase_linux_amd64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Verify auth
        run: supabase projects list --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy seed-scores (no-verify-jwt)
        run: supabase functions deploy seed-scores --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy enrich-pending (no-verify-jwt)
        run: supabase functions deploy enrich-pending --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy remaining functions (best-effort)
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ingest-raw-properties   --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy score-property          --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy enrich-property         --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy burnt-out-landlord-scan --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy fetch-properties        --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy health                  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
          supabase functions deploy notification-status     --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || true
